<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>編輯後台 — GAP 3D 知識庫</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

:root {
  --navy: #0b1622;
  --navy-mid: #131f2e;
  --navy-light: #1b2a3c;
  --gap-blue: #1a3fa6;

  /* 品牌色（與前台一致） */
  --gap-navy: #3b7dd8;
  --ath-purple: #a78bfa;

  --official: #3b82f6;
  --internal: #f59e0b;
  --warning: #ef4444;
  --ok: #34d399;

  --text: #e6ebf1;
  --text-dim: #8a99ab;
  --text-faint: #5b6b7e;
  --border: rgba(255,255,255,0.08);
  --card: rgba(255,255,255,0.035);
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans TC',sans-serif; background:var(--navy); color:var(--text); min-height:100vh; }

header {
  height:56px; background:var(--navy-mid); border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 24px; gap:14px;
  position:sticky; top:0; z-index:50;
}
.logo { font-family:'DM Mono',monospace; font-size:12px; background:var(--gap-blue); color:#fff; padding:4px 10px; border-radius:4px; letter-spacing:0.12em; }
header h1 { font-size:14px; font-weight:500; }
.header-right { margin-left:auto; display:flex; align-items:center; gap:8px; }

.icon-btn { width:30px; height:30px; border-radius:7px; border:1px solid var(--border); background:var(--card); color:var(--text-dim); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:14px; }
.icon-btn:hover { color:var(--text); border-color:rgba(255,255,255,0.18); }

.btn { padding:8px 18px; border-radius:7px; font-size:13px; font-weight:500; cursor:pointer; border:none; font-family:inherit; transition:all 0.15s; white-space:nowrap; }
.btn-primary { background:var(--gap-blue); color:#fff; }
.btn-primary:hover { background:#1e4fc7; }
.btn-danger { background:rgba(239,68,68,0.15); color:#fca5a5; border:1px solid rgba(239,68,68,0.2); }
.btn-danger:hover { background:rgba(239,68,68,0.25); }
.btn-ghost { background:var(--card); color:var(--text-dim); border:1px solid var(--border); text-decoration:none; display:inline-flex; align-items:center; }
.btn-ghost:hover { color:var(--text); }

.field { margin-bottom:14px; }
.field label { font-size:12px; color:var(--text-dim); display:block; margin-bottom:5px; }
.field input, .field textarea, .field select {
  width:100%; background:var(--navy-light); border:1px solid var(--border);
  border-radius:7px; padding:8px 12px; font-size:13px; color:var(--text);
  font-family:inherit; outline:none; transition:border-color 0.15s;
}
.field input:focus, .field textarea:focus, .field select:focus { border-color:rgba(59,130,246,0.5); }
.field textarea { resize:vertical; min-height:90px; line-height:1.6; }
.field select option { background:var(--navy-mid); }

#adminWrap { padding:28px 36px; max-width:1100px; margin:0 auto; }

.admin-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
.admin-title { font-size:18px; font-weight:700; }

.section-tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:24px; padding-bottom:16px; border-bottom:1px solid var(--border); overflow-x:auto; }
.sec-tab { padding:6px 14px; font-size:12px; font-weight:500; border-radius:6px; cursor:pointer; color:var(--text-dim); border:1px solid var(--border); background:var(--card); font-family:inherit; transition:all 0.12s; display:inline-flex; align-items:center; gap:5px; white-space:nowrap; }
.sec-tab:hover { color:var(--text); }
.sec-tab.active { background:var(--gap-blue); color:#fff; border-color:transparent; }
.sec-tab .lock { font-size:10px; opacity:0.75; }

.entries-toolbar { display:flex; align-items:center; gap:10px; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; }
.entries-title { font-size:15px; font-weight:600; }
.entry-search { position:relative; width:230px; }
.entry-search input {
  width:100%; background:var(--navy-light); border:1px solid var(--border); border-radius:7px;
  padding:7px 10px 7px 30px; font-size:12px; color:var(--text); font-family:inherit; outline:none;
}
.entry-search input:focus { border-color:rgba(59,130,246,0.5); }
.entry-search .icn { position:absolute; left:9px; top:50%; transform:translateY(-50%); font-size:12px; color:var(--text-faint); }

.protected-banner {
  display:flex; align-items:flex-start; gap:8px; background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.28);
  color:#fcd34d; font-size:12px; padding:9px 12px; border-radius:8px; margin-bottom:14px; line-height:1.5;
}

.entry-row { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:14px 16px; margin-bottom:8px; display:flex; align-items:flex-start; gap:14px; }
.entry-info { flex:1; min-width:0; }
.entry-title { font-size:13px; font-weight:600; color:#fff; margin-bottom:4px; }
.entry-meta { font-size:11.5px; color:var(--text-dim); display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.entry-preview { font-size:12px; color:var(--text-dim); margin-top:4px; line-height:1.5; }
.entry-actions { display:flex; gap:6px; flex-shrink:0; }

.badge-sm { font-size:10px; padding:2px 7px; border-radius:4px; font-weight:600; white-space:nowrap; }
.bs-official { background:rgba(59,130,246,0.2); color:#93c5fd; }
.bs-internal  { background:rgba(245,158,11,0.2); color:#fcd34d; }
.bs-warning   { background:rgba(239,68,68,0.2);  color:#fca5a5; }
.bs-gap { background:rgba(59,125,216,0.18); color:var(--gap-navy); border:1px solid rgba(59,125,216,0.3); }
.bs-ath { background:rgba(167,139,250,0.18); color:var(--ath-purple); border:1px solid rgba(167,139,250,0.3); }
.bs-shared { background:rgba(148,163,184,0.14); color:#94a3b8; }

.brand-strip { height:3px; border-radius:3px 3px 0 0; margin:-28px -32px 20px; transition:background 0.15s; }

.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:200; align-items:center; justify-content:center; }
.overlay.open { display:flex; }

.modal { background:var(--navy-mid); border:1px solid var(--border); border-radius:12px; padding:28px 32px; width:600px; max-width:95vw; max-height:90vh; overflow-y:auto; }
.modal h3 { font-size:16px; font-weight:700; margin-bottom:20px; }
.modal-footer { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; }

.brand-warning {
  display:none; align-items:flex-start; gap:8px; font-size:12px; padding:9px 12px; border-radius:8px; margin:-6px 0 14px; line-height:1.5;
}
.brand-warning.show { display:flex; }
.brand-warning.bw-shared { background:rgba(148,163,184,0.1); border:1px solid rgba(148,163,184,0.25); color:#cbd5e1; }
.brand-warning.bw-gap { background:rgba(59,125,216,0.12); border:1px solid rgba(59,125,216,0.3); color:#bcd6f8; }
.brand-warning.bw-ath { background:rgba(167,139,250,0.12); border:1px solid rgba(167,139,250,0.3); color:#dcd2fb; }

.path-list { display:flex; flex-direction:column; gap:6px; margin-bottom:6px; }
.path-item { display:flex; gap:6px; }
.path-item input { flex:1; font-family:'DM Mono',monospace; font-size:12px; }
.add-path-btn { font-size:12px; padding:5px 10px; border-radius:5px; border:1px dashed var(--border); background:none; color:var(--text-dim); cursor:pointer; font-family:inherit; }
.add-path-btn:hover { color:var(--text); border-color:rgba(255,255,255,0.15); }

.toast { position:fixed; bottom:24px; right:24px; background:var(--navy-mid); border:1px solid var(--border); border-radius:8px; padding:10px 16px; font-size:13px; color:var(--text); z-index:300; transform:translateY(10px); opacity:0; transition:all 0.2s; }
.toast.show { transform:translateY(0); opacity:1; }
.toast.success { border-color:rgba(16,185,129,0.3); color:#6ee7b7; }
.toast.error   { border-color:rgba(239,68,68,0.3);  color:#fca5a5; }

.loading { display:flex; align-items:center; justify-content:center; padding:40px; color:var(--text-dim); gap:10px; }
.spinner { width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--official); border-radius:50%; animation:spin 0.7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

.devtype-group { display:flex; gap:10px; flex-wrap:wrap; margin-top:6px; }
.devtype-group label { display:flex; align-items:center; gap:4px; font-size:12px; cursor:pointer; }

/* ── 確認對話框 ── */
.confirm-modal { width:380px; text-align:left; }
.confirm-modal .cm-icon { font-size:22px; margin-bottom:10px; }
.confirm-modal p { font-size:13px; color:var(--text-dim); line-height:1.6; margin-bottom:4px; }
.confirm-modal h3 { margin-bottom:10px; }

/* ── 導覽 ── */
#tourOverlay { display:none; position:fixed; inset:0; z-index:400; }
#tourOverlay.open { display:block; }
.tour-dim { position:fixed; inset:0; background:rgba(0,0,0,0.55); }
.tour-highlight { position:fixed; border-radius:9px; box-shadow:0 0 0 4px rgba(59,130,246,0.55), 0 0 0 2000px rgba(0,0,0,0.55); transition:all 0.25s; pointer-events:none; z-index:401; }
.tour-tip { position:fixed; background:var(--navy-mid); border:1px solid rgba(59,130,246,0.4); border-radius:10px; padding:16px 18px; width:280px; z-index:402; box-shadow:0 12px 30px rgba(0,0,0,0.4); transition:all 0.25s; }
.tour-tip .tt-step { font-size:10px; color:var(--official); font-weight:700; letter-spacing:0.06em; margin-bottom:6px; }
.tour-tip h4 { font-size:13px; margin-bottom:6px; }
.tour-tip p { font-size:12px; color:var(--text-dim); line-height:1.6; margin-bottom:12px; }
.tour-tip-footer { display:flex; justify-content:space-between; align-items:center; }
.tour-tip-footer .skip { font-size:11.5px; color:var(--text-faint); cursor:pointer; background:none; border:none; font-family:inherit; }
.tour-tip-footer .next { font-size:12px; padding:5px 14px; }
</style>
</head>
<body>

<header>
  <div class="logo">GAP3D</div>
  <h1>編輯後台</h1>
  <div class="header-right">
    <button class="icon-btn" title="使用導覽" onclick="startTour(true)">？</button>
    <a href="index-GAP3D.html" class="btn btn-ghost">← 回知識庫</a>
  </div>
</header>

<div id="adminWrap">
  <div class="admin-header">
    <div class="admin-title">內容管理</div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" id="tourBtnAccounts" onclick="openAccountsManager()">🔑 帳號管理</button>
      <button class="btn btn-ghost" id="tourBtnSections" onclick="openSectionManager()">⚙️ 管理分類</button>
      <button class="btn btn-primary" id="tourBtnNewEntry" onclick="openNewEntry()">＋ 新增條目</button>
    </div>
  </div>

  <div class="section-tabs" id="sectionTabs">
    <div class="loading"><div class="spinner"></div></div>
  </div>

  <div id="protectedBanner"></div>

  <div class="entries-toolbar">
    <div class="entries-title" id="currentSectionName"></div>
    <div class="entry-search">
      <span class="icn">🔍</span>
      <input id="entrySearchInput" placeholder="搜尋標題或內容…" oninput="setEntrySearch(this.value)">
    </div>
  </div>
  <div id="entriesList">
    <div class="loading"><div class="spinner"></div>載入中…</div>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="modalOverlay">
  <div class="modal">
    <div class="brand-strip" id="modalBrandStrip"></div>
    <h3 id="modalTitle">新增條目</h3>
    <div id="modalProtectedWarning"></div>
    <div class="field">
      <label>所屬分類</label>
      <select id="fSection"></select>
    </div>
    <div class="field">
      <label>標題</label>
      <input id="fTitle" placeholder="例如：粒子/碰撞設定">
    </div>
    <div class="field">
      <label>內容（支援換行）</label>
      <textarea id="fContent" rows="6" placeholder="詳細說明…"></textarea>
    </div>
    <div class="field">
      <label>路徑（可多個）</label>
      <div class="path-list" id="pathList"></div>
      <button class="add-path-btn" onclick="addPathField()">＋ 新增路徑</button>
    </div>
    <div class="field">
      <label>來源標籤</label>
      <select id="fSource">
        <option value="internal">🟡 內部SOP</option>
        <option value="official">🔵 官方規範</option>
        <option value="warning">🔴 重要注意</option>
      </select>
    </div>
    <div class="field">
      <label id="fBrandsLabel">適用品牌</label>
      <select id="fBrands" onchange="updateBrandWarning()">
        <option value="">🌐 全品牌（GAP + ATH 共用）</option>
        <option value="GAP">🔵 GAP 專屬</option>
        <option value="ATH">🟣 ATHLETA 專屬</option>
      </select>
      <div class="brand-warning" id="brandWarning"></div>
    </div>
    <div class="field">
      <label>適用開發類型</label>
      <div class="devtype-group" id="devTypeGroup">
        <label><input type="checkbox" value="all" checked style="accent-color:var(--official)"> 全部</label>
        <label><input type="checkbox" value="collab" style="accent-color:var(--official)"> 聯名Collab</label>
        <label><input type="checkbox" value="proto" style="accent-color:var(--official)"> Proto</label>
        <label><input type="checkbox" value="la" style="accent-color:var(--official)"> LA</label>
        <label><input type="checkbox" value="fitla" style="accent-color:var(--official)"> Fit-LA</label>
        <label><input type="checkbox" value="color" style="accent-color:var(--official)"> 各色樣</label>
        <label><input type="checkbox" value="fit" style="accent-color:var(--official)"> Fit(非正單)</label>
      </div>
    </div>
    <div class="field" style="display:flex;align-items:center;gap:8px">
      <input type="checkbox" id="fIsChecklist" style="accent-color:var(--official)">
      <label for="fIsChecklist" style="font-size:13px;cursor:pointer">這是 Checklist 項目</label>
    </div>
    <div class="field" id="stageField" style="display:none">
      <label>所屬 Stage（僅階段總覽分類使用）</label>
      <select id="fStage">
        <option value="">— 不屬於任何 Stage —</option>
        <option value="proto">STAGE 2 — 3D Proto</option>
        <option value="la">STAGE 3 — 3D LA</option>
        <option value="fit">STAGE 4 — 3D Fit</option>
        <option value="reference">STAGE 6 — 3D Reference</option>
      </select>
    </div>
    <div class="field">
      <label>排序（數字越小越前面）</label>
      <input id="fOrder" type="number" value="0">
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="deleteBtn" onclick="confirmDeleteEntry()" style="display:none">刪除</button>
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveEntry()">儲存</button>
    </div>
  </div>
</div>

<!-- 帳號管理 Modal -->
<div class="overlay" id="accountsModalOverlay">
  <div class="modal" style="width:680px">
    <h3>帳號管理</h3>
    <div style="margin:16px 0 10px;display:flex;justify-content:flex-end">
      <button class="btn btn-primary" onclick="openNewAccount()">＋ 新增帳號</button>
    </div>
    <div id="accountsList" style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeAccountsModal()">關閉</button>
    </div>
  </div>
</div>

<!-- 新增/編輯帳號 Modal -->
<div class="overlay" id="accountEditOverlay">
  <div class="modal" style="width:500px">
    <h3 id="accountEditTitle">新增帳號</h3>
    <div class="field">
      <label>系統名稱</label>
      <input id="acName" placeholder="例如：GAP INC">
    </div>
    <div class="field">
      <label>帳號</label>
      <input id="acUsername" placeholder="帳號" style="font-family:'DM Mono',monospace">
    </div>
    <div class="field">
      <label>密碼</label>
      <input id="acPassword" placeholder="密碼" style="font-family:'DM Mono',monospace">
    </div>
    <div class="field">
      <label>備註（可選）</label>
      <input id="acNote" placeholder="例如：每季更新">
    </div>
    <div class="field">
      <label>排序</label>
      <input id="acOrder" type="number" value="0">
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="acDeleteBtn" onclick="confirmDeleteAccount()" style="display:none">刪除</button>
      <button class="btn btn-ghost" onclick="closeAccountEdit()">取消</button>
      <button class="btn btn-primary" onclick="saveAccount()">儲存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- 分類管理 Modal -->
<div class="overlay" id="sectionModalOverlay">
  <div class="modal" style="width:680px">
    <h3>管理分類</h3>
    <div style="margin:16px 0 10px;display:flex;justify-content:flex-end">
      <button class="btn btn-primary" onclick="openNewSection()">＋ 新增分類</button>
    </div>
    <div id="sectionList" style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeSectionModal()">關閉</button>
    </div>
  </div>
</div>

<!-- 新增/編輯分類 Modal -->
<div class="overlay" id="sectionEditOverlay">
  <div class="modal" style="width:500px">
    <h3 id="sectionEditTitle">新增分類</h3>
    <div id="sectionProtectedWarning"></div>
    <div class="field">
      <label>分類名稱</label>
      <input id="seName" placeholder="例如：各色 3D 定位">
    </div>
    <div class="field">
      <label>Slug（英文，用於網址）</label>
      <input id="seSlug" placeholder="例如：color-placement" style="font-family:'DM Mono',monospace">
    </div>
    <div class="field">
      <label>群組名稱</label>
      <input id="seGroup" placeholder="例如：非正單（不上CLO-SET）">
    </div>
    <div class="field">
      <label>Icon（emoji）</label>
      <input id="seIcon" placeholder="例如：🎨" style="width:80px">
    </div>
    <div class="field">
      <label>排序（數字越小越前面）</label>
      <input id="seOrder" type="number" value="0">
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="seDeleteBtn" onclick="confirmDeleteSection()" style="display:none">刪除</button>
      <button class="btn btn-ghost" onclick="closeSectionEdit()">取消</button>
      <button class="btn btn-primary" onclick="saveSection()">儲存</button>
    </div>
  </div>
</div>

<!-- 通用二次確認 Modal -->
<div class="overlay" id="confirmOverlay">
  <div class="modal confirm-modal">
    <div class="cm-icon" id="cmIcon">⚠️</div>
    <h3 id="cmTitle">確定要刪除嗎？</h3>
    <p id="cmBody"></p>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeConfirm()">取消</button>
      <button class="btn btn-danger" id="cmConfirmBtn">刪除</button>
    </div>
  </div>
</div>

<!-- 導覽 -->
<div id="tourOverlay">
  <div class="tour-dim" onclick="skipTour()"></div>
  <div class="tour-highlight" id="tourHighlight"></div>
  <div class="tour-tip" id="tourTip">
    <div class="tt-step" id="tourStepLabel">STEP 1/5</div>
    <h4 id="tourTitle"></h4>
    <p id="tourBody"></p>
    <div class="tour-tip-footer">
      <button class="skip" onclick="skipTour()">跳過導覽</button>
      <button class="btn btn-primary next" onclick="nextTourStep()" id="tourNextBtn">下一步</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://popnhqizqkhitguopapf.supabase.co';
const SUPABASE_KEY = 'sb_publishable_tNgioaXmZhzppbg9tg6Ong_WYTGdZAo';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let allSections = [], allEntries = [];
let currentSectionId = null, editingEntryId = null;
let entrySearchVal = '';

async function init() {
  await loadData();
  renderSectionTabs();
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('section');
  const targetSection = slug
    ? allSections.find(s => s.slug === slug)
    : allSections[0];
  if (targetSection) selectSection(targetSection.id);
  if (!localStorage.getItem('gap3d_admin_onboarded')) setTimeout(() => startTour(false), 500);
}

async function loadData() {
  const [{ data: s }, { data: e }] = await Promise.all([
    sb.from('sections').select('*').order('sort_order'),
    sb.from('entries').select('*').order('sort_order'),
  ]);
  allSections = s || [];
  allEntries  = e || [];
}

function isProtectedSection(s) {
  if (!s) return false;
  return s.slug === 'tracker-data' || String(s.slug||'').startsWith('_');
}

function renderSectionTabs() {
  document.getElementById('sectionTabs').innerHTML = allSections.map(s =>
    `<button class="sec-tab" id="tab-${s.id}" onclick="selectSection('${s.id}')">${s.icon||''} ${esc(s.name)}${isProtectedSection(s)?' <span class="lock" title="系統保護分類">🔒</span>':''}</button>`
  ).join('');
  document.getElementById('fSection').innerHTML = allSections.map(s =>
    `<option value="${s.id}">${esc(s.name)}${isProtectedSection(s)?' 🔒':''}</option>`
  ).join('');
}

function selectSection(id) {
  currentSectionId = id;
  entrySearchVal = '';
  const input = document.getElementById('entrySearchInput');
  if (input) input.value = '';
  document.querySelectorAll('.sec-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+id)?.classList.add('active');
  const sec = allSections.find(s=>s.id===id);
  document.getElementById('currentSectionName').textContent = sec?.name || '';
  const bannerEl = document.getElementById('protectedBanner');
  bannerEl.innerHTML = isProtectedSection(sec)
    ? `<div class="protected-banner">🔒 <div>這是<strong>系統保護分類</strong>——內容供追蹤系統或首頁邏輯讀取，修改或刪除前請確認影響範圍。</div></div>`
    : '';
  renderEntries();
}

let brandFilterVal = '';
function setBrandFilter(v) { brandFilterVal = v; renderEntries(); }
function setEntrySearch(v) { entrySearchVal = v.trim().toLowerCase(); renderEntries(); }
function brandTagAdmin(e) {
  const b = String(e.brands||'').trim().toUpperCase();
  if (b === 'GAP') return '<span class="badge-sm bs-gap">🔵 GAP</span>';
  if (b === 'ATH') return '<span class="badge-sm bs-ath">🟣 ATH</span>';
  return '<span class="badge-sm bs-shared">🌐 全品牌</span>';
}
function renderEntries() {
  let entries = allEntries.filter(e => e.section_id === currentSectionId);
  const el = document.getElementById('entriesList');
  const total = entries.length;
  if (brandFilterVal) {
    entries = entries.filter(e => {
      const b = String(e.brands||'').trim().toUpperCase();
      return brandFilterVal === 'ALL' ? (!b || b === 'ALL') : b === brandFilterVal;
    });
  }
  if (entrySearchVal) {
    entries = entries.filter(e =>
      String(e.title||'').toLowerCase().includes(entrySearchVal) ||
      String(e.content||'').toLowerCase().includes(entrySearchVal)
    );
  }
  const fBtn = (v, label) => `<button onclick="setBrandFilter('${v}')" style="background:${brandFilterVal===v?'rgba(59,130,246,0.25)':'none'};border:1px solid ${brandFilterVal===v?'#3b82f6':'rgba(148,163,184,0.3)'};color:inherit;border-radius:6px;padding:3px 10px;font-size:12px;cursor:pointer;font-family:inherit">${label}</button>`;
  const filterBar = total ? `
    <div style="display:flex;gap:6px;align-items:center;margin-bottom:10px;font-size:12px;color:#94a3b8">
      品牌篩選：${fBtn('','全部')} ${fBtn('ALL','🌐 共用')} ${fBtn('GAP','🔵 GAP')} ${fBtn('ATH','🟣 ATH')}
    </div>` : '';
  if (!total) {
    el.innerHTML = '<div class="loading" style="padding:30px">此分類尚無條目，點擊右上角「新增條目」開始</div>';
    return;
  }
  if (!entries.length) {
    el.innerHTML = filterBar + '<div class="loading" style="padding:30px">找不到符合條件的條目</div>';
    return;
  }
  const bm = { official:'bs-official', internal:'bs-internal', warning:'bs-warning' };
  const sl = { official:'官方規範', internal:'內部SOP', warning:'重要注意' };
  el.innerHTML = filterBar + entries.map(e => `
    <div class="entry-row">
      <div class="entry-info">
        <div class="entry-title">${esc(e.title)}</div>
        <div class="entry-meta">
          <span class="badge-sm ${bm[e.source]}">${sl[e.source]}</span>
          ${brandTagAdmin(e)}
          <span>${(e.dev_type||['all']).join(', ')}</span>
          ${e.is_checklist?'<span style="color:#6ee7b7">✓ Checklist</span>':''}
        </div>
        ${e.content?`<div class="entry-preview">${esc(e.content).substring(0,100)}…</div>`:''}
        ${(e.paths||[]).map(p=>`<code style="font-size:10px;color:#7dd3fc;display:block;margin-top:3px">${esc(p)}</code>`).join('')}
      </div>
      <div class="entry-actions">
        <button class="btn btn-ghost" onclick="openEditEntry('${e.id}')">✏️ 編輯</button>
        <button class="btn btn-ghost" onclick="duplicateEntry('${e.id}')" title="以此條目為底建立新條目（品牌自動切到另一邊）">📄 複製</button>
      </div>
    </div>
  `).join('');
}

function updateBrandWarning() {
  const v = document.getElementById('fBrands').value;
  const w = document.getElementById('brandWarning');
  w.className = 'brand-warning show';
  const strip = document.getElementById('modalBrandStrip');
  if (v === 'GAP') {
    w.classList.add('bw-gap');
    w.innerHTML = '🔵 這是 <strong>GAP 專屬</strong>內容，只會出現在 GAP 前台。';
    strip.style.background = 'var(--gap-navy)';
  } else if (v === 'ATH') {
    w.classList.add('bw-ath');
    w.innerHTML = '🟣 這是 <strong>ATHLETA 專屬</strong>內容，只會出現在 ATH 前台。';
    strip.style.background = 'var(--ath-purple)';
  } else {
    w.classList.add('bw-shared');
    w.innerHTML = '🌐 這是<strong>全品牌共用</strong>內容——修改後 GAP 與 ATHLETA 前台會<strong>同時</strong>變更。';
    strip.style.background = 'rgba(148,163,184,0.5)';
  }
}

function openNewEntry() {
  editingEntryId = null;
  document.getElementById('modalTitle').textContent = '新增條目';
  document.getElementById('deleteBtn').style.display = 'none';
  document.getElementById('fTitle').value = '';
  document.getElementById('fContent').value = '';
  document.getElementById('fSource').value = 'internal';
  document.getElementById('fBrands').value = '';
  document.getElementById('fOrder').value = 0;
  document.getElementById('fIsChecklist').checked = false;
  document.getElementById('fStage').value = '';
  document.getElementById('fSection').value = currentSectionId || allSections[0]?.id;
  document.getElementById('pathList').innerHTML = '';
  document.querySelectorAll('#devTypeGroup input').forEach(cb => { cb.checked = cb.value==='all'; });
  toggleStageField(currentSectionId);
  renderModalProtectedWarning(currentSectionId);
  updateBrandWarning();
  document.getElementById('modalOverlay').classList.add('open');
}

function openEditEntry(id) {
  editingEntryId = id;
  const e = allEntries.find(x=>x.id===id);
  if (!e) return;
  document.getElementById('modalTitle').textContent = '編輯條目';
  document.getElementById('deleteBtn').style.display = 'block';
  document.getElementById('fTitle').value = e.title||'';
  document.getElementById('fContent').value = e.content||'';
  document.getElementById('fSource').value = e.source||'internal';
  document.getElementById('fBrands').value = (e.brands||'').toUpperCase()==='ALL' ? '' : (e.brands||'').toUpperCase();
  document.getElementById('fOrder').value = e.sort_order||0;
  document.getElementById('fIsChecklist').checked = !!e.is_checklist;
  document.getElementById('fSection').value = e.section_id;
  document.getElementById('fStage').value = e.stage||'';
  document.getElementById('pathList').innerHTML = '';
  (e.paths||[]).forEach(p => addPathField(p));
  const types = e.dev_type||['all'];
  document.querySelectorAll('#devTypeGroup input').forEach(cb => { cb.checked = types.includes(cb.value); });
  toggleStageField(e.section_id);
  renderModalProtectedWarning(e.section_id);
  updateBrandWarning();
  document.getElementById('modalOverlay').classList.add('open');
}

function duplicateEntry(id) {
  openEditEntry(id);          // 先沿用編輯的帶入邏輯填滿表單
  editingEntryId = null;      // 但清除編輯目標 → 儲存時會 insert 成新條目
  document.getElementById('modalTitle').textContent = '📄 複製條目（儲存後成為新條目）';
  document.getElementById('deleteBtn').style.display = 'none';  // 複製模式不能刪（沒有目標可刪）
  // 品牌自動翻到另一邊：GAP→ATH、ATH→GAP；共用維持共用（自行調整）
  const bSel = document.getElementById('fBrands');
  if (bSel.value === 'GAP') bSel.value = 'ATH';
  else if (bSel.value === 'ATH') bSel.value = 'GAP';
  updateBrandWarning();
  showToast('已帶入原條目內容，請調整品牌與內容後儲存', '');
}

function renderModalProtectedWarning(sectionId) {
  const sec = allSections.find(s => s.id === sectionId);
  document.getElementById('modalProtectedWarning').innerHTML = isProtectedSection(sec)
    ? `<div class="protected-banner">🔒 此分類為<strong>系統保護分類</strong>，內容可能被追蹤系統或首頁邏輯讀取，請謹慎修改。</div>`
    : '';
}

function toggleStageField(sectionId) {
  const stageSections = allSections.filter(s =>
    ['stages','prefit','details','checklist'].includes(s.slug)
  );
  const show = stageSections.some(s => s.id === sectionId);
  document.getElementById('stageField').style.display = show ? 'block' : 'none';
}

document.getElementById('fSection').addEventListener('change', function() {
  toggleStageField(this.value);
  renderModalProtectedWarning(this.value);
});

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

function addPathField(val='') {
  const div = document.createElement('div');
  div.className = 'path-item';
  div.innerHTML = `<input type="text" placeholder="\\\\192.168.1.220\\3ddb\\..." value="${esc(val)}"><button class="btn btn-danger" onclick="this.parentElement.remove()" style="padding:5px 10px">✕</button>`;
  document.getElementById('pathList').appendChild(div);
}

async function saveEntry() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { showToast('請填寫標題','error'); return; }
  const section_id = document.getElementById('fSection').value;
  const stageSections = allSections.filter(s =>
    ['stages','prefit','details','checklist'].includes(s.slug)
  );
  const isStageSection = stageSections.some(s => s.id === section_id);

  const payload = {
    section_id,
    title,
    content:      document.getElementById('fContent').value.trim(),
    source:       document.getElementById('fSource').value,
    sort_order:   parseInt(document.getElementById('fOrder').value)||0,
    is_checklist: document.getElementById('fIsChecklist').checked,
    paths:        [...document.querySelectorAll('#pathList .path-item input')].map(i=>i.value.trim()).filter(Boolean),
    dev_type:     [...document.querySelectorAll('#devTypeGroup input:checked')].map(cb=>cb.value),
    stage:        isStageSection ? (document.getElementById('fStage').value || null) : null,
    brands:       document.getElementById('fBrands').value || null,
  };
  if (!payload.dev_type.length) payload.dev_type = ['all'];

  const { error } = editingEntryId
    ? await sb.from('entries').update(payload).eq('id', editingEntryId)
    : await sb.from('entries').insert(payload);

  if (error) {
    if (String(error.message).includes('brands')) {
      showToast('儲存失敗：entries 表還沒有 brands 欄位，請先到 Supabase SQL Editor 執行：alter table entries add column if not exists brands text;','error');
    } else {
      showToast('儲存失敗：'+error.message,'error');
    }
  }
  else { showToast('儲存成功 ✓','success'); closeModal(); await loadData(); selectSection(payload.section_id); }
}

function confirmDeleteEntry() {
  if (!editingEntryId) return;
  const e = allEntries.find(x=>x.id===editingEntryId);
  openConfirm({
    title: '確定要刪除這個條目？',
    body: `「${e?.title||''}」刪除後無法復原，前台將立即看不到此內容。`,
    onConfirm: deleteEntry,
  });
}
async function deleteEntry() {
  const { error } = await sb.from('entries').delete().eq('id', editingEntryId);
  if (error) { showToast('刪除失敗','error'); }
  else { showToast('已刪除','success'); closeModal(); await loadData(); selectSection(currentSectionId); }
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast '+type+' show';
  setTimeout(()=>t.classList.remove('show'), 2500);
}

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let confirmCb = null;
function openConfirm({title, body, onConfirm, icon='⚠️', confirmLabel='刪除'}) {
  document.getElementById('cmIcon').textContent = icon;
  document.getElementById('cmTitle').textContent = title;
  document.getElementById('cmBody').textContent = body;
  const btn = document.getElementById('cmConfirmBtn');
  btn.textContent = confirmLabel;
  confirmCb = onConfirm;
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm() { document.getElementById('confirmOverlay').classList.remove('open'); confirmCb = null; }
document.getElementById('cmConfirmBtn').addEventListener('click', () => {
  const cb = confirmCb;
  closeConfirm();
  if (cb) cb();
});

async function saveSection() {
  const name  = document.getElementById('seName').value.trim();
  const slug  = document.getElementById('seSlug').value.trim();
  const group = document.getElementById('seGroup').value.trim();
  if (!name || !slug || !group) { showToast('請填寫名稱、Slug 和群組', 'error'); return; }

  const payload = {
    name,
    slug,
    group_name:  group,
    icon:        document.getElementById('seIcon').value.trim() || null,
    sort_order:  parseInt(document.getElementById('seOrder').value) || 0,
  };

  const { error } = editingSectionId
    ? await sb.from('sections').update(payload).eq('id', editingSectionId)
    : await sb.from('sections').insert(payload);

  if (error) { showToast('儲存失敗：' + error.message, 'error'); return; }
  showToast('儲存成功 ✓', 'success');
  closeSectionEdit();
  await loadData();
  renderSectionTabs();
  renderSectionList();
}

function confirmDeleteSection() {
  if (!editingSectionId) return;
  const s = allSections.find(x => x.id === editingSectionId);
  const hasEntries = allEntries.some(e => e.section_id === editingSectionId);
  if (hasEntries) {
    showToast('此分類還有條目，請先刪除條目', 'error'); return;
  }
  openConfirm({
    title: `確定要刪除「${s?.name||''}」？`,
    body: isProtectedSection(s)
      ? '這是系統保護分類，刪除可能影響追蹤系統或前台首頁邏輯。請確認已與團隊確認過。'
      : '刪除後此分類將從後台與前台選單消失。',
    onConfirm: deleteSection,
  });
}
async function deleteSection() {
  const { error } = await sb.from('sections').delete().eq('id', editingSectionId);
  if (error) { showToast('刪除失敗：' + error.message, 'error'); return; }
  showToast('已刪除', 'success');
  closeSectionEdit();
  await loadData();
  renderSectionTabs();
  renderSectionList();
}

  { sel: '#sectionTabs', title: '分類頁籤', body: '所有內容依分類分區，帶 🔒 的是系統保護分類（追蹤系統或首頁邏輯會讀取），修改前請多留意。' },
  { sel: '#tourBtnNewEntry', title: '新增條目', body: '點這裡建立新內容。預設「適用品牌」是全品牌共用——只有品牌特規才需要另外標 GAP 或 ATH。' },
  { sel: '.entry-search', title: '搜尋條目', body: '條目變多後，用搜尋快速定位標題或內文關鍵字。' },
  { sel: '#tourBtnSections', title: '管理分類', body: '在這裡新增、排序、調整分類群組與 icon。' },
  { sel: '#tourBtnAccounts', title: '帳號管理', body: '維護前台登入測驗會用到的帳號密碼，以展開式卡片呈現。' },
];
let tourIdx = 0;

function startTour(manual) {
  tourIdx = 0;
  document.getElementById('tourOverlay').classList.add('open');
  renderTourStep();
}
function renderTourStep() {
  const step = tourSteps[tourIdx];
  const target = document.querySelector(step.sel);
  const hl = document.getElementById('tourHighlight');
  const tip = document.getElementById('tourTip');
  if (target) {
    const r = target.getBoundingClientRect();
    hl.style.left = (r.left-6)+'px'; hl.style.top = (r.top-6)+'px';
    hl.style.width = (r.width+12)+'px'; hl.style.height = (r.height+12)+'px';
    let top = r.bottom + 14;
    let left = Math.min(r.left, window.innerWidth - 300);
    if (top + 160 > window.innerHeight) top = r.top - 174;
    tip.style.top = top+'px'; tip.style.left = left+'px';
  }
  document.getElementById('tourStepLabel').textContent = `STEP ${tourIdx+1}/${tourSteps.length}`;
  document.getElementById('tourTitle').textContent = step.title;
  document.getElementById('tourBody').textContent = step.body;
  document.getElementById('tourNextBtn').textContent = tourIdx === tourSteps.length-1 ? '完成' : '下一步';
}
function nextTourStep() {
  if (tourIdx >= tourSteps.length-1) { skipTour(); return; }
  tourIdx++;
  renderTourStep();
}
function skipTour() {
  document.getElementById('tourOverlay').classList.remove('open');
  localStorage.setItem('gap3d_admin_onboarded', '1');
}

// ── Start ──────────────────────────────────────
init();
</script>
