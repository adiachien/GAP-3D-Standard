<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>編輯後台 — GAP 3D 知識庫</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

:root {
  --navy: #0d1b2a;
  --navy-mid: #152535;
  --navy-light: #1e3347;
  --gap-blue: #1a3fa6;
  --official: #3b82f6;
  --internal: #f59e0b;
  --warning: #ef4444;
  --text: #e2e8f0;
  --text-dim: #8899aa;
  --border: rgba(255,255,255,0.07);
  --card: rgba(255,255,255,0.04);
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans TC',sans-serif; background:var(--navy); color:var(--text); min-height:100vh; }

header {
  height:56px; background:var(--navy-mid); border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 24px; gap:14px;
  position:sticky; top:0; z-index:50;
}
.logo { font-family:'DM Mono',monospace; font-size:12px; background:var(--gap-blue); color:#fff; padding:4px 10px; border-radius:4px; letter-spacing:0.12em; }
header h1 { font-size:14px; font-weight:500; }
.header-right { margin-left:auto; }

.btn { padding:8px 18px; border-radius:7px; font-size:13px; font-weight:500; cursor:pointer; border:none; font-family:inherit; transition:all 0.15s; }
.btn-primary { background:var(--gap-blue); color:#fff; }
.btn-primary:hover { background:#1e4fc7; }
.btn-danger { background:rgba(239,68,68,0.15); color:#fca5a5; border:1px solid rgba(239,68,68,0.2); }
.btn-danger:hover { background:rgba(239,68,68,0.25); }
.btn-ghost { background:var(--card); color:var(--text-dim); border:1px solid var(--border); text-decoration:none; display:inline-flex; align-items:center; }
.btn-ghost:hover { color:var(--text); }

.field { margin-bottom:14px; }
.field label { font-size:12px; color:var(--text-dim); display:block; margin-bottom:5px; }
.field input, .field textarea, .field select {
  width:100%; background:var(--navy-light); border:1px solid var(--border);
  border-radius:7px; padding:8px 12px; font-size:13px; color:var(--text);
  font-family:inherit; outline:none; transition:border-color 0.15s;
}
.field input:focus, .field textarea:focus, .field select:focus { border-color:rgba(59,130,246,0.5); }
.field textarea { resize:vertical; min-height:90px; line-height:1.6; }
.field select option { background:var(--navy-mid); }

#adminWrap { padding:28px 36px; max-width:1100px; margin:0 auto; }

.admin-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
.admin-title { font-size:18px; font-weight:700; }

.section-tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:24px; padding-bottom:16px; border-bottom:1px solid var(--border); }
.sec-tab { padding:6px 14px; font-size:12px; font-weight:500; border-radius:6px; cursor:pointer; color:var(--text-dim); border:1px solid var(--border); background:var(--card); font-family:inherit; transition:all 0.12s; }
.sec-tab:hover { color:var(--text); }
.sec-tab.active { background:var(--gap-blue); color:#fff; border-color:transparent; }
.sec-tab.hidden-sec { border-color:rgba(251,191,36,0.35); color:#fbbf24; }
.sec-tab.hidden-sec.active { background:rgba(251,191,36,0.15); color:#fbbf24; border-color:rgba(251,191,36,0.5); }

.entries-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.entries-title { font-size:15px; font-weight:600; }

.entry-row { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:14px 16px; margin-bottom:8px; display:flex; align-items:flex-start; gap:14px; }
.entry-info { flex:1; }
.entry-title { font-size:13px; font-weight:600; color:#fff; margin-bottom:4px; }
.entry-meta { font-size:11.5px; color:var(--text-dim); display:flex; gap:10px; flex-wrap:wrap; }
.entry-preview { font-size:12px; color:var(--text-dim); margin-top:4px; line-height:1.5; }
.entry-actions { display:flex; gap:6px; flex-shrink:0; }

.badge-sm { font-size:10px; padding:1px 6px; border-radius:3px; font-weight:600; }
.bs-official { background:rgba(59,130,246,0.2); color:#93c5fd; }
.bs-internal  { background:rgba(245,158,11,0.2); color:#fcd34d; }
.bs-warning   { background:rgba(239,68,68,0.2);  color:#fca5a5; }

.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:200; align-items:center; justify-content:center; }
.overlay.open { display:flex; }

.modal { background:var(--navy-mid); border:1px solid var(--border); border-radius:12px; padding:28px 32px; width:600px; max-width:95vw; max-height:90vh; overflow-y:auto; }
.modal h3 { font-size:16px; font-weight:700; margin-bottom:20px; }
.modal-footer { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; }

.path-list { display:flex; flex-direction:column; gap:6px; margin-bottom:6px; }
.path-item { display:flex; gap:6px; }
.path-item input { flex:1; font-family:'DM Mono',monospace; font-size:12px; }
.add-path-btn { font-size:12px; padding:5px 10px; border-radius:5px; border:1px dashed var(--border); background:none; color:var(--text-dim); cursor:pointer; font-family:inherit; }
.add-path-btn:hover { color:var(--text); border-color:rgba(255,255,255,0.15); }

.toast { position:fixed; bottom:24px; right:24px; background:var(--navy-mid); border:1px solid var(--border); border-radius:8px; padding:10px 16px; font-size:13px; color:var(--text); z-index:300; transform:translateY(10px); opacity:0; transition:all 0.2s; }
.toast.show { transform:translateY(0); opacity:1; }
.toast.success { border-color:rgba(16,185,129,0.3); color:#6ee7b7; }
.toast.error   { border-color:rgba(239,68,68,0.3);  color:#fca5a5; }

.loading { display:flex; align-items:center; justify-content:center; padding:40px; color:var(--text-dim); gap:10px; }
.spinner { width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--official); border-radius:50%; animation:spin 0.7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

.devtype-group { display:flex; gap:10px; flex-wrap:wrap; margin-top:6px; }
.devtype-group label { display:flex; align-items:center; gap:4px; font-size:12px; cursor:pointer; }
</style>
</head>
<body>

<header>
  <div class="logo">GAP</div>
  <h1>編輯後台</h1>
  <div class="header-right">
    <a href="index-GAP3D.html" class="btn btn-ghost">← 回知識庫</a>
  </div>
</header>

<div id="adminWrap">
  <div class="admin-header">
    <div class="admin-title">內容管理</div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" onclick="openAccountsManager()">🔑 帳號管理</button>
      <button class="btn btn-ghost" onclick="openSectionManager()">⚙️ 管理分類</button>
      <button class="btn btn-primary" onclick="openNewEntry()">＋ 新增條目</button>
    </div>
  </div>

  <div class="section-tabs" id="sectionTabs">
    <div class="loading"><div class="spinner"></div></div>
  </div>

  <div class="entries-header">
    <div class="entries-title" id="currentSectionName"></div>
  </div>
  <div id="entriesList">
    <div class="loading"><div class="spinner"></div>載入中…</div>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">新增條目</h3>
    <div class="field">
      <label>所屬分類</label>
      <select id="fSection"></select>
    </div>
    <div class="field">
      <label>標題</label>
      <input id="fTitle" placeholder="例如：粒子/碰撞設定">
    </div>
    <div class="field">
      <label>內容（支援換行）</label>
      <textarea id="fContent" rows="6" placeholder="詳細說明…"></textarea>
      <div style="display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap">
        <button class="add-path-btn" type="button" onclick="insertTwoColTemplate()">⇆ 插入兩欄對照範本</button>
        <span style="font-size:11px;color:var(--text-dim)">TWO_COL 格式，前台會渲染成綠／橘兩欄對照卡</span>
      </div>
    </div>
    <div class="field">
      <label>路徑／連結（可多個）</label>
      <div class="path-list" id="pathList"></div>
      <button class="add-path-btn" onclick="addPathField()">＋ 新增路徑</button>
      <div style="font-size:11px;color:var(--text-dim);margin-top:6px;line-height:1.7">
        格式：<code style="color:#7dd3fc">標籤｜路徑或網址</code>（用全形「｜」分隔，標籤可省略）<br>
        http 開頭 → 前台顯示「🔗 開啟」按鈕；其他 → 顯示「📋 copy」按鈕
      </div>
    </div>
    <div class="field">
      <label>來源標籤</label>
      <select id="fSource">
        <option value="internal">🟡 內部SOP</option>
        <option value="official">🔵 官方規範</option>
        <option value="warning">🔴 重要注意</option>
      </select>
    </div>
    <div class="field" id="stageField" style="display:none">
      <label>所屬 Stage（樣品種類／Prefit／細節／Checklist 分類使用）</label>
      <select id="fStage">
        <option value="">— 不屬於任何 Stage —</option>
        <option value="proto">STAGE 2 — 3D Proto</option>
        <option value="la">STAGE 3 — 3D LA</option>
        <option value="fit">STAGE 4 — 3D Fit</option>
        <option value="reference">STAGE 6 — 3D RS</option>
      </select>
    </div>
    <div class="field">
      <label>排序（數字越小越前面）</label>
      <input id="fOrder" type="number" value="0">
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="deleteBtn" onclick="deleteEntry()" style="display:none">刪除</button>
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveEntry()">儲存</button>
    </div>
  </div>
</div>

<!-- 帳號管理 Modal -->
<div class="overlay" id="accountsModalOverlay">
  <div class="modal" style="width:680px">
    <h3 style="margin-bottom:6px">帳號管理</h3>
    <div style="font-size:11.5px;color:var(--text-dim);margin-bottom:14px;line-height:1.6">資料存在「帳號密碼」分類的條目裡（帳號／密碼會存成 <code style="color:#7dd3fc">帳號｜xxx</code>、<code style="color:#7dd3fc">密碼｜xxx</code> 路徑），前台帳號密碼頁讀的就是這份資料。</div>
    <div style="margin:16px 0 10px;display:flex;justify-content:flex-end">
      <button class="btn btn-primary" onclick="openNewAccount()">＋ 新增帳號</button>
    </div>
    <div id="accountsList" style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeAccountsModal()">關閉</button>
    </div>
  </div>
</div>

<!-- 新增/編輯帳號 Modal -->
<div class="overlay" id="accountEditOverlay">
  <div class="modal" style="width:500px">
    <h3 id="accountEditTitle">新增帳號</h3>
    <div class="field">
      <label>系統名稱</label>
      <input id="acName" placeholder="例如：GAP INC">
    </div>
    <div class="field">
      <label>帳號</label>
      <input id="acUsername" placeholder="帳號" style="font-family:'DM Mono',monospace">
    </div>
    <div class="field">
      <label>密碼</label>
      <input id="acPassword" placeholder="密碼" style="font-family:'DM Mono',monospace">
    </div>
    <div class="field">
      <label>備註（可選）</label>
      <input id="acNote" placeholder="例如：每季更新">
    </div>
    <div class="field">
      <label>排序</label>
      <input id="acOrder" type="number" value="0">
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="acDeleteBtn" onclick="deleteAccount()" style="display:none">刪除</button>
      <button class="btn btn-ghost" onclick="closeAccountEdit()">取消</button>
      <button class="btn btn-primary" onclick="saveAccount()">儲存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- 分類管理 Modal -->
<div class="overlay" id="sectionModalOverlay">
  <div class="modal" style="width:680px">
    <h3>管理分類</h3>
    <div style="margin:16px 0 10px;display:flex;justify-content:flex-end">
      <button class="btn btn-primary" onclick="openNewSection()">＋ 新增分類</button>
    </div>
    <div id="sectionList" style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeSectionModal()">關閉</button>
    </div>
  </div>
</div>

<!-- 新增/編輯分類 Modal -->
<div class="overlay" id="sectionEditOverlay">
  <div class="modal" style="width:500px">
    <h3 id="sectionEditTitle">新增分類</h3>
    <div class="field">
      <label>分類名稱</label>
      <input id="seName" placeholder="例如：各色 3D 定位">
    </div>
    <div class="field">
      <label>Slug（英文，用於網址）</label>
      <input id="seSlug" placeholder="例如：color-placement" style="font-family:'DM Mono',monospace">
    </div>
    <div class="field">
      <label>群組名稱</label>
      <input id="seGroup" placeholder="例如：非正單（不上CLO-SET）">
    </div>
    <div class="field">
      <label>Icon（emoji）</label>
      <input id="seIcon" placeholder="例如：🎨" style="width:80px">
    </div>
    <div class="field">
      <label>排序（數字越小越前面）</label>
      <input id="seOrder" type="number" value="0">
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="seDeleteBtn" onclick="deleteSectionConfirm()" style="display:none">刪除</button>
      <button class="btn btn-ghost" onclick="closeSectionEdit()">取消</button>
      <button class="btn btn-primary" onclick="saveSection()">儲存</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://popnhqizqkhitguopapf.supabase.co';
const SUPABASE_KEY = 'sb_publishable_tNgioaXmZhzppbg9tg6Ong_WYTGdZAo';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let allSections = [], allEntries = [];
let currentSectionId = null, editingEntryId = null;

async function init() {
  await loadData();
  renderSectionTabs();
  // 讀取 URL 參數，自動選到對應分類
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('section');
  const targetSection = slug
    ? allSections.find(s => s.slug === slug)
    : allSections[0];
  if (targetSection) selectSection(targetSection.id);
}

async function loadData() {
  const [{ data: s }, { data: e }] = await Promise.all([
    sb.from('sections').select('*').order('sort_order'),
    sb.from('entries').select('*').order('sort_order'),
  ]);
  allSections = s || [];
  allEntries  = e || [];
}

function isHiddenSection(s) { return (s.group_name || '').startsWith('_'); }

function renderSectionTabs() {
  const normal = allSections.filter(s => !isHiddenSection(s));
  const hidden = allSections.filter(isHiddenSection);
  document.getElementById('sectionTabs').innerHTML =
    normal.map(s =>
      `<button class="sec-tab" id="tab-${s.id}" onclick="selectSection('${s.id}')">${s.icon||''} ${s.name}</button>`
    ).join('') +
    (hidden.length ? `
      <span style="align-self:center;font-size:11px;color:#fbbf24;margin-left:8px;padding-left:12px;border-left:1px solid var(--border)">⚠️ 系統資料</span>` +
      hidden.map(s =>
        `<button class="sec-tab hidden-sec" id="tab-${s.id}" onclick="selectSection('${s.id}')">${s.icon||''} ${s.name}</button>`
      ).join('') : '');
  document.getElementById('fSection').innerHTML = allSections.map(s =>
    `<option value="${s.id}">${isHiddenSection(s) ? '⚠️ ' : ''}${s.name}</option>`
  ).join('');
}

function selectSection(id) {
  currentSectionId = id;
  document.querySelectorAll('.sec-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+id)?.classList.add('active');
  document.getElementById('currentSectionName').textContent = allSections.find(s=>s.id===id)?.name || '';
  renderEntries();
}

const STAGE_NAMES = {
  proto:     'STAGE 2 · 3D Proto',
  la:        'STAGE 3 · 3D LA',
  fit:       'STAGE 4 · 3D Fit',
  reference: 'STAGE 6 · 3D RS',
};

function renderEntries() {
  const entries = allEntries.filter(e => e.section_id === currentSectionId);
  const el = document.getElementById('entriesList');
  const sec = allSections.find(s => s.id === currentSectionId);
  const warn = (sec && isHiddenSection(sec)) ? `
    <div style="background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.3);border-radius:8px;padding:12px 16px;margin-bottom:12px;font-size:12.5px;color:#fbbf24;line-height:1.7">
      ⚠️ 這是<strong>系統自動使用的資料</strong>（例如開發追蹤的匯入內容），內容為程式格式（JSON）。<br>
      誤改任何一個字都可能讓前台對應功能故障，請勿在這裡編輯。
    </div>` : '';
  if (!entries.length) {
    el.innerHTML = warn + '<div class="loading" style="padding:30px">此分類尚無條目，點擊右上角「新增條目」開始</div>';
    return;
  }
  const bm = { official:'bs-official', internal:'bs-internal', warning:'bs-warning' };
  const sl = { official:'官方規範', internal:'內部SOP', warning:'重要注意' };
  el.innerHTML = warn + entries.map(e => `
    <div class="entry-row">
      <div class="entry-info">
        <div class="entry-title">${esc(e.title)}</div>
        <div class="entry-meta">
          <span class="badge-sm ${bm[e.source]||'bs-internal'}">${sl[e.source]||'內部SOP'}</span>
          ${e.stage ? `<span style="color:#93c5fd">🏷 ${STAGE_NAMES[e.stage]||e.stage}</span>` : ''}
          ${(e.content||'').startsWith('TWO_COL') ? '<span style="color:#6ee7b7">⇆ 兩欄對照</span>' : ''}
        </div>
        ${e.content?`<div class="entry-preview">${esc(e.content).substring(0,100)}…</div>`:''}
        ${(e.paths||[]).map(p=>`<code style="font-size:10px;color:#7dd3fc;display:block;margin-top:3px">${esc(p)}</code>`).join('')}
      </div>
      <div class="entry-actions">
        <button class="btn btn-ghost" onclick="openEditEntry('${e.id}')">✏️ 編輯</button>
      </div>
    </div>
  `).join('');
}

function openNewEntry() {
  editingEntryId = null;
  document.getElementById('modalTitle').textContent = '新增條目';
  document.getElementById('deleteBtn').style.display = 'none';
  document.getElementById('fTitle').value = '';
  document.getElementById('fContent').value = '';
  document.getElementById('fSource').value = 'internal';
  document.getElementById('fOrder').value = 0;
  document.getElementById('fStage').value = '';
  document.getElementById('fSection').value = currentSectionId || allSections[0]?.id;
  document.getElementById('pathList').innerHTML = '';
  toggleStageField(currentSectionId);
  document.getElementById('modalOverlay').classList.add('open');
}

function openEditEntry(id) {
  editingEntryId = id;
  const e = allEntries.find(x=>x.id===id);
  if (!e) return;
  document.getElementById('modalTitle').textContent = '編輯條目';
  document.getElementById('deleteBtn').style.display = 'block';
  document.getElementById('fTitle').value = e.title||'';
  document.getElementById('fContent').value = e.content||'';
  document.getElementById('fSource').value = e.source||'internal';
  document.getElementById('fOrder').value = e.sort_order||0;
  document.getElementById('fSection').value = e.section_id;
  document.getElementById('fStage').value = e.stage||'';
  document.getElementById('pathList').innerHTML = '';
  (e.paths||[]).forEach(p => addPathField(p));
  toggleStageField(e.section_id);
  document.getElementById('modalOverlay').classList.add('open');
}

function toggleStageField(sectionId) {
  const stageSections = allSections.filter(s =>
    ['stages','prefit','details','checklist'].includes(s.slug)
  );
  const show = stageSections.some(s => s.id === sectionId);
  document.getElementById('stageField').style.display = show ? 'block' : 'none';
}

// 當分類改變時，動態顯示/隱藏 Stage 欄位
document.getElementById('fSection').addEventListener('change', function() {
  toggleStageField(this.value);
});

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

function addPathField(val='') {
  const div = document.createElement('div');
  div.className = 'path-item';
  div.innerHTML = `<input type="text" placeholder="標籤｜\\\\192.168.1.220\\3ddb\\…（標籤可省略）" value="${esc(val)}"><button class="btn btn-danger" onclick="this.parentElement.remove()" style="padding:5px 10px">✕</button>`;
  document.getElementById('pathList').appendChild(div);
}

function insertTwoColTemplate() {
  const ta = document.getElementById('fContent');
  if (ta.value.trim() && !confirm('會覆蓋目前的內容，確定要插入範本嗎？')) return;
  ta.value = 'TWO_COL\n✅ 左欄標題\n左欄內容第一行\n左欄內容第二行\n---SPLIT---\n⚠️ 右欄標題\n右欄內容第一行\n右欄內容第二行';
  ta.focus();
}

async function saveEntry() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { showToast('請填寫標題','error'); return; }
  const section_id = document.getElementById('fSection').value;
  const stageSections = allSections.filter(s =>
    ['stages','prefit','details','checklist'].includes(s.slug)
  );
  const isStageSection = stageSections.some(s => s.id === section_id);

  const payload = {
    section_id,
    title,
    content:      document.getElementById('fContent').value.trim(),
    source:       document.getElementById('fSource').value,
    sort_order:   parseInt(document.getElementById('fOrder').value)||0,
    paths:        [...document.querySelectorAll('#pathList .path-item input')].map(i=>i.value.trim()).filter(Boolean),
    stage:        isStageSection ? (document.getElementById('fStage').value || null) : null,
  };

  const { error } = editingEntryId
    ? await sb.from('entries').update(payload).eq('id', editingEntryId)
    : await sb.from('entries').insert(payload);

  if (error) { showToast('儲存失敗：'+error.message,'error'); }
  else { showToast('儲存成功 ✓','success'); closeModal(); await loadData(); selectSection(payload.section_id); }
}

async function deleteEntry() {
  if (!editingEntryId || !confirm('確定要刪除這個條目嗎？')) return;
  const { error } = await sb.from('entries').delete().eq('id', editingEntryId);
  if (error) { showToast('刪除失敗','error'); }
  else { showToast('已刪除','success'); closeModal(); await loadData(); selectSection(currentSectionId); }
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast '+type+' show';
  setTimeout(()=>t.classList.remove('show'), 2500);
}

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── 帳號管理（管理 accounts 分類的條目，前台帳號密碼頁讀的就是這裡）──
const ACCOUNTS_SLUG = 'accounts';
let editingAccountId = null;   // entries 表的 id
let acExtraPaths = [];         // 編輯時保留「帳號／密碼」以外的其他 paths

function accountsSection() { return allSections.find(s => s.slug === ACCOUNTS_SLUG); }
function accountEntries() {
  const sec = accountsSection();
  return sec ? allEntries.filter(e => e.section_id === sec.id) : [];
}

// 從條目解析帳號／密碼（存在 paths：「帳號｜xxx」「密碼｜yyy」）
function acParse(e) {
  let username = '', password = '', extra = [];
  (e.paths || []).forEach(p => {
    const i = p.indexOf('｜');
    const label = i > -1 ? p.slice(0, i).trim() : '';
    const val   = i > -1 ? p.slice(i + 1).trim() : p.trim();
    if (label === '帳號') username = val;
    else if (label === '密碼') password = val;
    else extra.push(p);
  });
  return { username, password, extra };
}

async function openAccountsManager() {
  await loadData();
  if (!accountsSection()) {
    showToast('找不到 accounts 分類，請先在「管理分類」建立 slug 為 accounts 的分類', 'error');
    return;
  }
  renderAccountsList();
  document.getElementById('accountsModalOverlay').classList.add('open');
}
function closeAccountsModal() {
  document.getElementById('accountsModalOverlay').classList.remove('open');
}

function renderAccountsList() {
  const el = document.getElementById('accountsList');
  const list = accountEntries();
  if (!list.length) {
    el.innerHTML = '<div style="color:var(--text-dim);font-size:13px;padding:12px">尚無帳號</div>';
    return;
  }
  el.innerHTML = list.map(e => {
    const { username, password } = acParse(e);
    return `
    <div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:12px">
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600;color:#fff">🔑 ${esc(e.title||'')}</div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:3px;font-family:'DM Mono',monospace">
          ${esc(username) || '—'} ／ ${password ? '••••••' : '—'}
        </div>
        ${e.content ? `<div style="font-size:11px;color:var(--text-dim);margin-top:2px">${esc(e.content)}</div>` : ''}
      </div>
      <button class="btn btn-ghost" style="padding:5px 10px;font-size:12px" onclick="openEditAccount('${e.id}')">✏️ 編輯</button>
    </div>
  `;
  }).join('');
}

function openNewAccount() {
  editingAccountId = null;
  acExtraPaths = [];
  document.getElementById('accountEditTitle').textContent = '新增帳號';
  document.getElementById('acDeleteBtn').style.display = 'none';
  ['acName','acUsername','acPassword','acNote'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('acOrder').value = accountEntries().length;
  document.getElementById('accountEditOverlay').classList.add('open');
}

function openEditAccount(id) {
  const e = allEntries.find(x => String(x.id) === String(id));
  if (!e) return;
  editingAccountId = e.id;
  const { username, password, extra } = acParse(e);
  acExtraPaths = extra;
  document.getElementById('accountEditTitle').textContent = '編輯帳號';
  document.getElementById('acDeleteBtn').style.display = 'block';
  document.getElementById('acName').value     = e.title   || '';
  document.getElementById('acUsername').value = username;
  document.getElementById('acPassword').value = password;
  document.getElementById('acNote').value     = e.content || '';
  document.getElementById('acOrder').value    = e.sort_order || 0;
  document.getElementById('accountEditOverlay').classList.add('open');
}

function closeAccountEdit() {
  document.getElementById('accountEditOverlay').classList.remove('open');
}

async function saveAccount() {
  const name = document.getElementById('acName').value.trim();
  if (!name) { showToast('請填寫系統名稱', 'error'); return; }
  const sec = accountsSection();
  if (!sec) { showToast('找不到 accounts 分類', 'error'); return; }

  const username = document.getElementById('acUsername').value.trim();
  const password = document.getElementById('acPassword').value.trim();
  const paths = [];
  if (username) paths.push('帳號｜' + username);
  if (password) paths.push('密碼｜' + password);
  paths.push(...acExtraPaths);

  const payload = {
    section_id: sec.id,
    title:      name,
    content:    document.getElementById('acNote').value.trim(),
    paths,
    source:     'internal',
    sort_order: parseInt(document.getElementById('acOrder').value) || 0,
  };
  const { error } = editingAccountId
    ? await sb.from('entries').update(payload).eq('id', editingAccountId)
    : await sb.from('entries').insert(payload);
  if (error) { showToast('儲存失敗：' + error.message, 'error'); return; }
  showToast('儲存成功 ✓', 'success');
  closeAccountEdit();
  await loadData();
  renderAccountsList();
  if (currentSectionId === sec.id) renderEntries();
}

async function deleteAccount() {
  if (!editingAccountId || !confirm('確定要刪除這個帳號？')) return;
  const { error } = await sb.from('entries').delete().eq('id', editingAccountId);
  if (error) { showToast('刪除失敗', 'error'); return; }
  showToast('已刪除', 'success');
  closeAccountEdit();
  await loadData();
  renderAccountsList();
  const sec = accountsSection();
  if (sec && currentSectionId === sec.id) renderEntries();
}

// ── 分類管理 ──────────────────────────────────
let editingSectionId = null;

function openSectionManager() {
  renderSectionList();
  document.getElementById('sectionModalOverlay').classList.add('open');
}
function closeSectionModal() {
  document.getElementById('sectionModalOverlay').classList.remove('open');
}

function renderSectionList() {
  const el = document.getElementById('sectionList');
  if (!allSections.length) {
    el.innerHTML = '<div style="color:var(--text-dim);font-size:13px;padding:12px">尚無分類</div>';
    return;
  }
  el.innerHTML = allSections.map(s => `
    <div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:12px">
      <span style="font-size:18px;width:28px;text-align:center">${s.icon||'📁'}</span>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600;color:#fff">${esc(s.name)}</div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:2px">
          slug: <span style="font-family:'DM Mono',monospace">${esc(s.slug)}</span>
          &nbsp;·&nbsp; 群組: ${esc(s.group_name)}
          &nbsp;·&nbsp; 排序: ${s.sort_order}
        </div>
      </div>
      <button class="btn btn-ghost" style="padding:5px 10px;font-size:12px" onclick="openEditSection('${s.id}')">✏️ 編輯</button>
    </div>
  `).join('');
}

function openNewSection() {
  editingSectionId = null;
  document.getElementById('sectionEditTitle').textContent = '新增分類';
  document.getElementById('seDeleteBtn').style.display = 'none';
  document.getElementById('seName').value = '';
  document.getElementById('seSlug').value = '';
  document.getElementById('seGroup').value = '';
  document.getElementById('seIcon').value = '';
  document.getElementById('seOrder').value = allSections.length;
  document.getElementById('sectionEditOverlay').classList.add('open');
}

function openEditSection(id) {
  editingSectionId = id;
  const s = allSections.find(x => x.id === id);
  if (!s) return;
  document.getElementById('sectionEditTitle').textContent = '編輯分類';
  document.getElementById('seDeleteBtn').style.display = 'block';
  document.getElementById('seName').value  = s.name || '';
  document.getElementById('seSlug').value  = s.slug || '';
  document.getElementById('seGroup').value = s.group_name || '';
  document.getElementById('seIcon').value  = s.icon || '';
  document.getElementById('seOrder').value = s.sort_order || 0;
  document.getElementById('sectionEditOverlay').classList.add('open');
}

function closeSectionEdit() {
  document.getElementById('sectionEditOverlay').classList.remove('open');
}

async function saveSection() {
  const name  = document.getElementById('seName').value.trim();
  const slug  = document.getElementById('seSlug').value.trim();
  const group = document.getElementById('seGroup').value.trim();
  if (!name || !slug || !group) { showToast('請填寫名稱、Slug 和群組', 'error'); return; }

  const payload = {
    name,
    slug,
    group_name:  group,
    icon:        document.getElementById('seIcon').value.trim() || null,
    sort_order:  parseInt(document.getElementById('seOrder').value) || 0,
  };

  const { error } = editingSectionId
    ? await sb.from('sections').update(payload).eq('id', editingSectionId)
    : await sb.from('sections').insert(payload);

  if (error) { showToast('儲存失敗：' + error.message, 'error'); return; }
  showToast('儲存成功 ✓', 'success');
  closeSectionEdit();
  await loadData();
  renderSectionTabs();
  renderSectionList();
}

async function deleteSectionConfirm() {
  if (!editingSectionId) return;
  const s = allSections.find(x => x.id === editingSectionId);
  const hasEntries = allEntries.some(e => e.section_id === editingSectionId);
  if (hasEntries) {
    showToast('此分類還有條目，請先刪除條目', 'error'); return;
  }
  if (!confirm(`確定要刪除「${s?.name}」嗎？`)) return;
  const { error } = await sb.from('sections').delete().eq('id', editingSectionId);
  if (error) { showToast('刪除失敗：' + error.message, 'error'); return; }
  showToast('已刪除', 'success');
  closeSectionEdit();
  await loadData();
  renderSectionTabs();
  renderSectionList();
}

// ── Start ──────────────────────────────────────
init();
</script>
